---
openapi: "3.0.3"
info:
  title: "Pet API"
  version: "1.0.0"
  description: "Simple API for managing pets"
servers:
- url: "https://api.example.com"
paths:
  /pets/{id}:
    get:
      summary: "Get a pet by ID"
      operationId: "getPetById"
      parameters:
      - name: "id"
        in: "path"
        required: true
        description: "ID of the pet"
        schema:
          type: "integer"
      responses:
        "200":
          description: "Pet found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: "Pet not found"
  /pets:
    post:
      summary: "Create a new pet"
      operationId: "createPet"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: "Pet created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: "Invalid input"
components:
  schemas:
    Pet:
      type: "object"
      required:
      - "name"
      - "type"
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: "string"
          example: "Fluffy"
        type:
          type: "string"
          example: "Cat"
